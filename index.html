<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouhli Food - Commandez en ligne</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4D03F;
            --gold-dark: #B8860B;
            --black: #0D0D0D;
            --black-light: #1A1A1A;
            --black-card: #141414;
            --red: #E63946;
            --red-dark: #C1121F;
            --white: #FFFFFF;
            --cream: #F5F0E8;
            --gray: #888888;
            --green: #2ECC71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--black);
            padding: 15px 20px;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--red);
        }

        .header-brand {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 1px;
        }

        .header-brand span {
            color: var(--red);
        }

        .header-tagline {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 6px;
        }

        /* ===== CATEGORIES NAV ===== */
        .categories-nav {
            position: fixed;
            top: 75px;
            left: 0;
            right: 0;
            z-index: 999;
            background: var(--black-light);
            padding: 10px 0;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .categories-nav::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            display: inline-block;
            padding: 8px 18px;
            margin: 0 5px;
            background: transparent;
            border: 1.5px solid var(--gold-dark);
            border-radius: 25px;
            color: var(--gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cat-btn.active, .cat-btn:hover {
            background: var(--gold);
            color: var(--black);
            border-color: var(--gold);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            padding-top: 140px;
            padding-bottom: 100px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            color: var(--gold);
            text-align: center;
            letter-spacing: 4px;
            margin: 25px 15px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .section-title::before, .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: var(--gold-dark);
        }

        /* ===== PRODUCT GRID ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 12px;
        }

        .product-card {
            background: var(--black-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.15);
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .product-card:hover {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .product-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            display: block;
        }

        .product-info {
            padding: 10px 12px 12px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .product-desc {
            font-size: 10px;
            color: var(--gray);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--gold);
        }

        .product-price span {
            font-size: 12px;
            color: var(--gold-dark);
        }

        .add-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--red);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .add-btn:active {
            transform: scale(0.9);
        }

        /* ===== PRODUCT DETAIL MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--black-card);
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            margin-bottom: 5px;
        }

        .modal-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .size-selector {
            margin-bottom: 20px;
        }

        .size-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .size-options {
            display: flex;
            gap: 10px;
        }

        .size-option {
            flex: 1;
            padding: 12px;
            background: var(--black-light);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .size-option.selected {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .size-option .size-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--white);
            display: block;
        }

        .size-option .size-price {
            font-size: 12px;
            color: var(--gold);
            margin-top: 4px;
            display: block;
        }

        .qty-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .qty-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--black-light);
            border: 2px solid var(--gold-dark);
            color: var(--gold);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--white);
            min-width: 40px;
            text-align: center;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 16px;
            background: var(--red);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .add-to-cart-btn:active {
            transform: scale(0.98);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== CART FLOATING BUTTON ===== */
        .cart-fab {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: none;
        }

        .cart-fab.active {
            display: block;
            animation: bounceIn 0.4s ease;
        }

        @keyframes bounceIn {
            0% { transform: translateX(-50%) scale(0); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .cart-btn {
            background: var(--gold);
            color: var(--black);
            border: none;
            border-radius: 50px;
            padding: 14px 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
            transition: all 0.2s;
        }

        .cart-btn:active {
            transform: scale(0.95);
        }

        .cart-count {
            background: var(--red);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        /* ===== CART SIDEBAR ===== */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
        }

        .cart-overlay.active {
            display: block;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 400px;
            background: var(--black);
            z-index: 2001;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .cart-overlay.active .cart-sidebar {
            transform: translateX(0);
        }

        .cart-header {
            padding: 20px;
            border-bottom: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cart-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--gold);
            letter-spacing: 3px;
        }

        .close-cart {
            background: none;
            border: none;
            color: var(--white);
            font-size: 24px;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--black-card);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .cart-item-img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 2px;
        }

        .cart-item-size {
            font-size: 11px;
            color: var(--gold);
            margin-bottom: 4px;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-qty-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--black-light);
            border: 1px solid var(--gold-dark);
            color: var(--gold);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-qty-value {
            font-size: 13px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        .cart-item-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            color: var(--gold);
            text-align: right;
        }

        .remove-item {
            background: none;
            border: none;
            color: var(--red);
            font-size: 16px;
            cursor: pointer;
            padding: 5px;
        }

        .cart-footer {
            padding: 20px;
            border-top: 2px solid var(--gold);
            background: var(--black-light);
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .cart-total-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray);
        }

        .cart-total-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: var(--gold);
        }

        .whatsapp-btn {
            width: 100%;
            padding: 16px;
            background: var(--green);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .whatsapp-btn:active {
            transform: scale(0.98);
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-cart i {
            font-size: 60px;
            color: var(--gold-dark);
            margin-bottom: 15px;
            display: block;
        }

        .empty-cart p {
            font-size: 16px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--green);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 900px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-brand">Bouhli <span>Food</span></div>
        <div class="header-tagline">FAST FOOD</div>
    </header>

    <!-- CATEGORIES NAV -->
    <nav class="categories-nav">
        <button class="cat-btn active" data-cat="all">Tout</button>
        <button class="cat-btn" data-cat="tacos">Tacos</button>
        <button class="cat-btn" data-cat="chawarma">Chawarma</button>
        <button class="cat-btn" data-cat="burger">Burger</button>
        <button class="cat-btn" data-cat="panini">Panini</button>
        <button class="cat-btn" data-cat="sandwich">Sandwich</button>
        <button class="cat-btn" data-cat="salade">Salades</button>
        <button class="cat-btn" data-cat="drink">Drinks</button>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
        <!-- Products will be injected here -->
    </main>

    <!-- CART FAB -->
    <div class="cart-fab" id="cartFab">
        <button class="cart-btn" onclick="openCart()">
            <i class="fas fa-shopping-bag"></i>
            <span>Mon Panier</span>
            <span class="cart-count" id="cartCount">0</span>
        </button>
    </div>

    <!-- PRODUCT MODAL -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>
            <img class="modal-img" id="modalImg" src="" alt="">
            <div class="modal-body">
                <h2 class="modal-name" id="modalName"></h2>
                <div class="modal-price" id="modalPrice"></div>
                <p class="modal-desc" id="modalDesc"></p>

                <div class="size-selector" id="sizeSelector">
                    <span class="size-label">Choisir la taille</span>
                    <div class="size-options" id="sizeOptions"></div>
                </div>

                <div class="qty-selector">
                    <button class="qty-btn" onclick="changeQty(-1)">
                        <i class="fas fa-minus"></i>
                    </button>
                    <span class="qty-value" id="qtyValue">1</span>
                    <button class="qty-btn" onclick="changeQty(1)">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

                <button class="add-to-cart-btn" onclick="addToCartFromModal()">
                    <i class="fas fa-plus"></i>
                    Ajouter au panier
                </button>
            </div>
        </div>
    </div>

    <!-- CART SIDEBAR -->
    <div class="cart-overlay" id="cartOverlay" onclick="closeCart(event)">
        <div class="cart-sidebar" onclick="event.stopPropagation()">
            <div class="cart-header">
                <h2><i class="fas fa-shopping-bag"></i> MON PANIER</h2>
                <button class="close-cart" onclick="closeCart()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="cart-items" id="cartItems">
                <!-- Cart items injected here -->
            </div>
            <div class="cart-footer" id="cartFooter">
                <div class="cart-total-row">
                    <span class="cart-total-label">TOTAL</span>
                    <span class="cart-total-value" id="cartTotal">0 Dh</span>
                </div>
                <button class="whatsapp-btn" onclick="sendWhatsApp()">
                    <i class="fab fa-whatsapp"></i>
                    Commander sur WhatsApp
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Ajouté au panier!</span>
    </div>

    <script>
        // ===== DATA =====
        const products = [
            // TACOS
            { id: 't1', cat: 'tacos', name: 'Tacos Poulet', price: 35, img: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=400', desc: 'Tacos français au poulet pané, frites, sauce fromagère et légumes frais.', sizes: {S: 30, M: 35, L: 40} },
            { id: 't2', cat: 'tacos', name: 'Tacos Viande Hachée', price: 45, img: 'https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=400', desc: 'Tacos avec viande hachée grillée, frites, fromage et sauce secrète.', sizes: {S: 40, M: 45, L: 50} },
            { id: 't3', cat: 'tacos', name: 'Tacos Mix', price: 45, img: 'https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=400', desc: 'Le meilleur des deux mondes: poulet + viande hachée dans un tacos généreux.', sizes: {S: 40, M: 45, L: 50} },
            { id: 't4', cat: 'tacos', name: 'Tacos Cordon Bleu', price: 40, img: 'https://images.unsplash.com/photo-1606755962773-d324e0a13086?w=400', desc: 'Tacos au cordon bleu de poulet croustillant avec frites et sauce.', sizes: {S: 35, M: 40, L: 45} },
            { id: 't5', cat: 'tacos', name: 'Tacos Nugget', price: 40, img: 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=400', desc: 'Tacos aux nuggets de poulet croustillants avec frites et sauce au choix.', sizes: {S: 35, M: 40, L: 45} },
            { id: 't6', cat: 'tacos', name: 'Tacos Kintaki', price: 40, img: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=400', desc: 'Tacos au poulet pané style Kintaki avec sauce spéciale.', sizes: {S: 35, M: 40, L: 45} },
            { id: 't7', cat: 'tacos', name: 'Tacos Bouhli Food', price: 50, img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=400', desc: 'NOTRE SPÉCIALITÉ! Tacos XXL avec double viande, double fromage et sauce maison.', sizes: {S: 45, M: 50, L: 55}, special: true },

            // CHAWARMA
            { id: 'c1', cat: 'chawarma', name: 'Chawarma', price: 30, img: 'https://images.unsplash.com/photo-1561651823-34a0658ebc9d?w=400', desc: 'Chawarma traditionnel au poulet ou viande avec légumes et sauce tahini.', sizes: {Standard: 30} },

            { id: 'd7', cat: 'drink', name: 'Simon', price: 10, img: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400', desc: 'Boisson Simon au choix.', sizes: {Standard: 10} },

        // ===== STATE =====
        let cart = [];
        let currentProduct = null;
        let currentQty = 1;
        let currentSize = null;

        // ===== RENDER PRODUCTS =====
        function renderProducts(filter = 'all') {
            const container = document.getElementById('mainContent');
            container.innerHTML = '';

            const categories = ['tacos', 'chawarma', 'burger', 'panini', 'sandwich', 'salade', 'drink'];
            const catNames = {
                tacos: 'TACOS',
                chawarma: 'CHAWARMA', 
                burger: 'BURGER',
                panini: 'PANINI & DORUM',
                sandwich: 'SANDWICH',
                salade: 'SALADES',
                drink: 'DRINKS'
            };

            const catsToRender = filter === 'all' ? categories : [filter];

            catsToRender.forEach(cat => {
                const catProducts = products.filter(p => p.cat === cat);
                if (catProducts.length === 0) return;

                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="section-title">
                        <i class="fas fa-utensils"></i>
                        ${catNames[cat]}
                        <i class="fas fa-utensils"></i>
                    </h2>
                    <div class="products-grid" id="grid-${cat}"></div>
                `;
                container.appendChild(section);

                const grid = section.querySelector('.products-grid');
                catProducts.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.onclick = () => openProduct(p);
                    card.innerHTML = `
                        <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
                        <div class="product-info">
                            <div class="product-name">${p.special ? '⭐ ' : ''}${p.name}</div>
                            <div class="product-desc">${p.desc.substring(0, 50)}...</div>
                            <div class="product-footer">
                                <span class="product-price">${p.price}<span>Dh</span></span>
                                <button class="add-btn" onclick="event.stopPropagation(); quickAdd('${p.id}')">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        // ===== CATEGORY FILTER =====
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderProducts(this.dataset.cat);
            });
        });

        // ===== PRODUCT MODAL =====
        function openProduct(product) {
            currentProduct = product;
            currentQty = 1;

            document.getElementById('modalImg').src = product.img;
            document.getElementById('modalName').textContent = (product.special ? '⭐ ' : '') + product.name;
            document.getElementById('modalDesc').textContent = product.desc;

            // Size selector
            const sizeSelector = document.getElementById('sizeSelector');
            const sizeOptions = document.getElementById('sizeOptions');
            sizeOptions.innerHTML = '';

            const sizes = Object.keys(product.sizes);
            if (sizes.length > 1) {
                sizeSelector.style.display = 'block';
                currentSize = sizes[1]; // Default to M

                sizes.forEach((size, i) => {
                    const opt = document.createElement('div');
                    opt.className = 'size-option' + (i === 1 ? ' selected' : '');
                    opt.onclick = () => selectSize(size, opt);
                    opt.innerHTML = `
                        <span class="size-name">${size}</span>
                        <span class="size-price">${product.sizes[size]} Dh</span>
                    `;
                    sizeOptions.appendChild(opt);
                });

                document.getElementById('modalPrice').textContent = product.sizes[currentSize] + ' Dh';
            } else {
                sizeSelector.style.display = 'none';
                currentSize = sizes[0];
                document.getElementById('modalPrice').textContent = product.price + ' Dh';
            }

            document.getElementById('qtyValue').textContent = '1';
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function selectSize(size, element) {
            currentSize = size;
            document.querySelectorAll('.size-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('modalPrice').textContent = currentProduct.sizes[size] + ' Dh';
        }

        function changeQty(delta) {
            currentQty = Math.max(1, currentQty + delta);
            document.getElementById('qtyValue').textContent = currentQty;
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ===== QUICK ADD =====
        function quickAdd(productId) {
            const product = products.find(p => p.id === productId);
            const size = Object.keys(product.sizes)[0];
            const price = product.sizes[size];

            addToCart(product, size, price, 1);
        }

        // ===== ADD TO CART =====
        function addToCartFromModal() {
            const price = currentProduct.sizes[currentSize];
            addToCart(currentProduct, currentSize, price, currentQty);
            closeModal();
        }

        function addToCart(product, size, price, qty) {
            const existing = cart.find(item => item.id === product.id && item.size === size);

            if (existing) {
                existing.qty += qty;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    size: size,
                    price: price,
                    qty: qty,
                    img: product.img
                });
            }

            updateCartUI();
            showToast(`${product.name} ajouté!`);
        }

        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = totalItems;

            if (totalItems > 0) {
                document.getElementById('cartFab').classList.add('active');
            } else {
                document.getElementById('cartFab').classList.remove('active');
            }

            renderCartItems();
        }

        // ===== CART SIDEBAR =====
        function openCart() {
            document.getElementById('cartOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCart(e) {
            if (!e || e.target === document.getElementById('cartOverlay')) {
                document.getElementById('cartOverlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            const footer = document.getElementById('cartFooter');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-basket"></i>
                        <p>Votre panier est vide</p>
                    </div>
                `;
                footer.style.display = 'none';
                return;
            }

            footer.style.display = 'block';
            container.innerHTML = '';

            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;

                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <img class="cart-item-img" src="${item.img}" alt="${item.name}">
                    <div class="cart-item-details">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-size">Taille: ${item.size}</div>
                        <div class="cart-item-qty">
                            <button class="cart-qty-btn" onclick="updateQty(${index}, -1)">
                                <i class="fas fa-minus"></i>
                            </button>
                            <span class="cart-qty-value">${item.qty}</span>
                            <button class="cart-qty-btn" onclick="updateQty(${index}, 1)">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div class="cart-item-price">${itemTotal} Dh</div>
                        <button class="remove-item" onclick="removeItem(${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('cartTotal').textContent = total + ' Dh';
        }

        function updateQty(index, delta) {
            cart[index].qty = Math.max(1, cart[index].qty + delta);
            updateCartUI();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // ===== WHATSAPP =====
        function sendWhatsApp() {
            const phone = '212626747325'; // Format international

            let message = '🍔 *COMMANDE BOUHLI FOOD* 🍔\n';
            message += '═══════════════════════\n\n';

            let total = 0;
            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                message += `📌 *${item.name}*\n`;
                message += `   Taille: ${item.size} | Qty: ${item.qty} | Prix: ${itemTotal} Dh\n\n`;
            });

            message += '═══════════════════════\n';
            message += `💰 *TOTAL: ${total} Dh*\n`;
            message += '═══════════════════════\n';
            message += '\nMerci! 🙏';

            const encodedMsg = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${phone}?text=${encodedMsg}`;

            window.open(whatsappUrl, '_blank');
        }

        // ===== TOAST =====
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===== INIT =====
        renderProducts();
    </script>
